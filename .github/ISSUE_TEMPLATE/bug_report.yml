name: Bug report
description: Report a bug so we can fix it
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please search existing issues first to avoid duplicates.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and its impact.
      placeholder: When I call ... the CRUD service throws ...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps or a code snippet / repo link that reproduces the issue.
      placeholder: |
        1. Define entity ...
        2. Call service.findAll(...)
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: package-version
    attributes:
      label: nestjs-drizzle-crud version
      placeholder: e.g. 3.1.0
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      description: Node version, NestJS version, Drizzle version, database.
      placeholder: Node 20.x, NestJS 11, drizzle-orm 0.45, PostgreSQL 16
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
